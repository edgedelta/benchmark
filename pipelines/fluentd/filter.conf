<source>
  @type http
  bind 0.0.0.0
  port 3085
  <parse>
    @type json
  </parse>
</source>

<filter benchmark.**>
  @type grep
  <exclude>
    key $.pii.color
    pattern /^Green$/
  </exclude>
</filter>

<match benchmark.**>
  @type s3
  s3_bucket {S3_PLACEHOLDER}
  s3_region us-west-2
  path fluentd/
  <format>
    @type json
  </format>
  <buffer>
    @type memory
    flush_interval 30s
    chunk_limit_size 8m
  </buffer>
</match>
