<source>
  @type http
  bind 0.0.0.0
  port 3085
  <parse>
    @type json
  </parse>
</source>

# CSV enrichment: pii.ipv4 -> region + env. The dictionary is loaded once into a
# global ($lut ||= ...) so it is not re-read per event.
<filter benchmark.**>
  @type record_transformer
  enable_ruby true
  <record>
    region ${ $lut ||= (require 'csv'; CSV.read('/tmp/lookup-benchmark.csv', headers: true).each_with_object({}) { |r, h| h[r['ipv4']] = [r['region'], r['env']] }); ($lut[(record['pii'] || {})['ipv4']] || ['Unknown', 'Unknown'])[0] }
    env ${ $lut ||= (require 'csv'; CSV.read('/tmp/lookup-benchmark.csv', headers: true).each_with_object({}) { |r, h| h[r['ipv4']] = [r['region'], r['env']] }); ($lut[(record['pii'] || {})['ipv4']] || ['Unknown', 'Unknown'])[1] }
  </record>
</filter>

<match benchmark.**>
  @type s3
  s3_bucket {S3_PLACEHOLDER}
  s3_region us-west-2
  path fluentd/
  <format>
    @type json
  </format>
  <buffer>
    @type memory
    flush_interval 30s
    chunk_limit_size 8m
  </buffer>
</match>
