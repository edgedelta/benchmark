input {
  http {
    host => "0.0.0.0"
    port => 2085
    codec => json
    ecs_compatibility => "disabled"
  }
}

filter {
  # CSV enrichment: pii.ipv4 -> region + env. The CSV has two value columns
  # (region, env); translate maps a single value, so a ruby filter that loads
  # the CSV once and sets both fields is the clean native route.
  ruby {
    init => "
      require 'csv'
      @lut = {}
      CSV.foreach('/tmp/lookup-benchmark.csv', headers: true) do |row|
        @lut[row['ipv4']] = [row['region'], row['env']]
      end
    "
    code => "
      hit = @lut[event.get('[pii][ipv4]')]
      if hit
        event.set('region', hit[0])
        event.set('env', hit[1])
      else
        event.set('region', 'Unknown')
        event.set('env', 'Unknown')
      end
    "
  }
}

output {
  s3 {
    region => "us-west-2"
    bucket => "{S3_PLACEHOLDER}"
    prefix => "logstash/"
    time_file => 1
    codec => json_lines
  }
}
