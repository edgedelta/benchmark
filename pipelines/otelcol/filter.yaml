receivers:
  webhookevent:
    endpoint: 0.0.0.0:5085
    path: "/"
    read_timeout: "10s"
    write_timeout: "10s"

processors:
  transform:
    error_mode: ignore
    log_statements:
      - context: log
        statements:
          - merge_maps(body, ParseJSON(body), "upsert") where IsMap(body) and true
          - set(body, ParseJSON(body)) where not IsMap(body) and true
          - set(cache["copy_field"], body["pii"]) where body["pii"] != nil
          - merge_maps(attributes, cache["copy_field"], "upsert") where cache["copy_field"] != nil
  filter:
    error_mode: ignore
    logs:
      log_record:
        - 'attributes["color"] == "Green"'
  batch:
    send_batch_size: 8192
    send_batch_max_size: 8192
    timeout: 30s

exporters:
  awss3:
    s3uploader:
      region: us-west-2
      s3_bucket: "{S3_PLACEHOLDER}"
      s3_prefix: otelcol
      s3_partition_format: 'year=%Y/month=%m/day=%d/hour=%H/minute=%M'
      compression: gzip
    marshaler: otlp_json
    timeout: 30s

service:
  pipelines:
    logs:
      receivers: [webhookevent]
      processors: [transform, filter, batch]
      exporters: [awss3]
